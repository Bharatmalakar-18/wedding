<!DOCTYPE html>
<html lang="hi" translate="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="google" content="notranslate">
<title>Royal Cinematic Wedding Invite</title>

<!-- External CSS -->
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Envelope -->
<div class="wrapper" id="wrapper">
  <div class="envelope">
    <div class="flap"></div>
    <div class="seal">शुभ</div>
  </div>
  <p class="tap-text">TAP TO OPEN</p>
</div>

<!-- Card Section -->
<div class="card-section" id="cardSection">
  <button class="music-btn" id="musicBtn">🔊</button>

  <div class="card">
    <h3>|| श्री गणेशाय नमः ||</h3>
    <h1>राहुल ❤️ प्रिया</h1>

    <div class="couple">
      <img src="https://randomuser.me/api/portraits/men/45.jpg">
      <img src="https://randomuser.me/api/portraits/women/65.jpg">
    </div>

    <div class="diya"></div>

    <p>सपरिवार आपको सादर आमंत्रित करते हैं</p>

    <div class="event-container">
      <div class="event">मेहंदी समारोह<br>23 अप्रैल</div>
      <div class="event">हल्दी समारोह<br>24 अप्रैल</div>
      <div class="event">संगीत संध्या<br>24 अप्रैल</div>
      <div class="event">विवाह समारोह<br>25 अप्रैल</div>
    </div>

    <div id="countdown"></div>

    <button class="whatsapp-btn" onclick="shareWhatsApp()">
      WhatsApp पर भेजें
    </button>
  </div>
</div>

<audio id="bgMusic" loop>
  <source src="shehnai.mp3" type="audio/mp3">
</audio>

<!-- External JS -->
<script src="script.js"></script>

</body>
</html>
